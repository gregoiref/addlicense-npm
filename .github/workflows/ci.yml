name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
      - run: npm install --save-dev @commitlint/cli @gregoiref/commitlint-config @commitlint/config-conventional
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  validate:
    name: Validate package structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: Check all package.json are valid JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          for f in packages/*/package.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
            echo "  OK: $f"
          done
      - name: Check wrapper script syntax
        run: node --check scripts/addlicense.js

  test:
    name: Unit tests (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
      - name: Run unit tests
        # node --test glob support requires Node 21+; use find for Node 18 compat.
        shell: bash
        run: node --test $(find tests -name "*.test.js" | tr '\n' ' ')

  install-compat:
    name: Install compat (${{ matrix.manager }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        manager: [npm, pnpm, yarn, bun]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
      - name: Setup pnpm
        if: matrix.manager == 'pnpm'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: latest
      - name: Setup bun
        if: matrix.manager == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Pack tarball
        run: npm pack
      - name: Install from tarball with ${{ matrix.manager }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARBALL=$(ls *.tgz | head -1)
          mkdir /tmp/compat-test && cd /tmp/compat-test
          # Copy .npmrc for @gregoiref registry scope + add auth for GitHub Packages.
          cp "${GITHUB_WORKSPACE}/.npmrc" .
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          case "${{ matrix.manager }}" in
            npm)  npm install "${GITHUB_WORKSPACE}/${TARBALL}" ;;
            pnpm) pnpm add    "${GITHUB_WORKSPACE}/${TARBALL}" ;;
            # yarn v1 classic reads .npmrc for registry scopes — works once packages
            # are published to GitHub Packages. Uses --ignore-optional as a safety net
            # in case the registry is temporarily unavailable.
            yarn) yarn add --ignore-optional "${GITHUB_WORKSPACE}/${TARBALL}" ;;
            bun)  bun add "${GITHUB_WORKSPACE}/${TARBALL}" ;;
          esac
      - name: Verify binary shim is present
        run: |
          if [ ! -f /tmp/compat-test/node_modules/.bin/addlicense ]; then
            echo "ERROR: node_modules/.bin/addlicense not found after install"
            exit 1
          fi
          echo "OK: addlicense binary shim found"
      - name: Verify wrapper resolves and exits gracefully (no binary installed)
        run: |
          cd /tmp/compat-test
          # Binary not on PATH — wrapper should print a clear error, not a Node stack trace
          node node_modules/.bin/addlicense --version 2>&1 || true
          output=$(node node_modules/.bin/addlicense --version 2>&1 || true)
          if echo "$output" | grep -q "TypeError\|Cannot find module\|ReferenceError"; then
            echo "ERROR: wrapper threw a Node.js error instead of a graceful message"
            echo "$output"
            exit 1
          fi
          echo "OK: wrapper exits gracefully"

  license-headers:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: GregoireF/addlicense-action@55c99fa137157d4f95969a283be7e48105f6de8d # v1.0.0
        with:
          args: --check .
          version: v1.0.0
