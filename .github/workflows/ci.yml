name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
      - run: npm install --save-dev @commitlint/cli @gregoiref/commitlint-config @commitlint/config-conventional
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  validate:
    name: Validate package structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: Check all package.json are valid JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          for f in packages/*/package.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
            echo "  OK: $f"
          done
      - name: Check wrapper script syntax
        run: node --check scripts/addlicense.js

  license-headers:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: GregoireF/addlicense-action@55c99fa137157d4f95969a283be7e48105f6de8d # v1.0.0
        with:
          args: --check .
          version: v1.0.0
