name: Publish

# Triggered automatically when addlicense core publishes a new release.
# Can also be run manually (workflow_dispatch) to publish a specific version.
# Payload / input: { "version": "v1.1.0" }
# Registry: GitHub Packages (npm.pkg.github.com) — uses GITHUB_TOKEN, no extra secret needed.
on:
  repository_dispatch:
    types: [addlicense-released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Build platform packages and publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Extract version
        id: version
        run: |
          # Support both repository_dispatch (client_payload) and workflow_dispatch (inputs)
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          NPM_VERSION="${VERSION#v}"
          echo "tag=${VERSION}"             >> "$GITHUB_OUTPUT"
          echo "npm_version=${NPM_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download and unpack platform binaries
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          PLATFORMS=(
            "linux-x64    linux   amd64 addlicense_linux_amd64.tar.gz"
            "linux-arm64  linux   arm64 addlicense_linux_arm64.tar.gz"
            "darwin-x64   darwin  amd64 addlicense_darwin_amd64.tar.gz"
            "darwin-arm64 darwin  arm64 addlicense_darwin_arm64.tar.gz"
            "win32-x64    windows amd64 addlicense_windows_amd64.zip"
            "win32-arm64  windows arm64 addlicense_windows_arm64.zip"
          )
          BASE_URL="https://github.com/GregoireF/addlicense/releases/download/${TAG}"
          for entry in "${PLATFORMS[@]}"; do
            read -r pkg_key _ _ archive <<< "$entry"
            url="${BASE_URL}/${archive}"
            echo "Downloading ${url}"
            curl -sSfL "$url" -o "/tmp/${archive}"
            dest="packages/${pkg_key}/bin"
            mkdir -p "$dest"
            if [[ "$archive" == *.zip ]]; then
              unzip -q "/tmp/${archive}" -d "$dest"
            else
              tar -xzf "/tmp/${archive}" -C "$dest"
            fi
          done

      - name: Bump versions in all package.json files
        env:
          NPM_VERSION: ${{ steps.version.outputs.npm_version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.NPM_VERSION;
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = process.env.NPM_VERSION;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          for dir in packages/*/; do
            node -e "
              const fs = require('fs');
              const p = '${dir}package.json';
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = process.env.NPM_VERSION;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dir in packages/*/; do
            echo "Publishing ${dir}"
            npm publish "$dir" --access public
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access public

      - name: Commit version bump and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/*/package.json
          git commit -m "chore(release): publish ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main "${{ steps.version.outputs.tag }}"
